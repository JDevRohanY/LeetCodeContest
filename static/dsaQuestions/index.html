<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Practice List — Swiggy · Zomato · Uber · Microsoft</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
            --text: #1a1a1a; --text2: #555550; --text3: #888882;
            --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
            --easy: #27500a; --easy-bg: #eaf3de; --easy-border: #639922;
            --med: #633806; --med-bg: #faeeda; --med-border: #ba7517;
            --hard: #791f1f; --hard-bg: #fcebeb; --hard-border: #e24b4a;
            --done-bg: #eaf3de; --done-border: #639922;
            --info-bg: #e6f1fb; --info-text: #0c447c; --info-border: #378add;
            --rad: 8px; --rad-lg: 12px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
                --text: #f0f0ee; --text2: #aaa9a4; --text3: #6a6a64;
                --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
                --easy: #c0dd97; --easy-bg: #173404; --easy-border: #3b6d11;
                --med: #fac775; --med-bg: #412402; --med-border: #854f0b;
                --hard: #f7c1c1; --hard-bg: #501313; --hard-border: #a32d2d;
                --done-bg: #173404; --done-border: #3b6d11;
                --info-bg: #042c53; --info-text: #b5d4f4; --info-border: #185fa5;
            }
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); }
        .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

        h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        .sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

        /* Stats row */
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.5rem; }
        .sc { background: var(--bg); border-radius: var(--rad); padding: 10px 12px; border: 0.5px solid var(--border); }
        .sl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
        .sv { font-size: 20px; font-weight: 600; }

        /* Progress */
        .prog-wrap { background: var(--bg2); border-radius: 20px; height: 5px; margin-bottom: 1.5rem; border: 0.5px solid var(--border); overflow: hidden; }
        .prog-fill { height: 100%; background: var(--easy-border); border-radius: 20px; transition: width 0.3s; }

        /* Filters */
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
        .filter-label { font-size: 12px; color: var(--text3); margin-right: 2px; }
        .fb { padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all 0.12s; }
        .fb:hover { background: var(--bg2); }
        .fb.on { background: var(--text); color: var(--bg); border-color: var(--text); }
        .search-wrap { margin-left: auto; }
        .search-wrap input { padding: 6px 12px; border-radius: var(--rad); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; font-family: inherit; outline: none; width: 200px; }
        .search-wrap input:focus { border-color: var(--info-border); }
        .filter-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }

        /* Section */
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .section-count { font-size: 11px; font-weight: 500; color: var(--text3); background: var(--bg2); padding: 2px 8px; border-radius: 20px; }

        /* Table */
        .qtable { width: 100%; border-collapse: collapse; }
        .qtable th { font-size: 11px; color: var(--text3); font-weight: 500; text-align: left; padding: 6px 10px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 0.5px solid var(--border2); }
        .qtable td { padding: 9px 10px; font-size: 13px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
        .qtable tr:last-child td { border-bottom: none; }
        .qtable tr.done td { color: var(--text3); }
        .qtable tr.done .q-name { text-decoration: line-through; }
        .qtable tr:hover td { background: var(--bg2); }
        .qtable tr.done:hover td { background: var(--done-bg); }

        .ck { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background: var(--bg); flex-shrink: 0; transition: all 0.12s; }
        .ck:hover { border-color: var(--easy-border); }
        .ck.on { background: var(--easy-bg); border-color: var(--easy-border); }
        .ck.on::after { content: ''; width: 9px; height: 5px; border-left: 2px solid var(--easy); border-bottom: 2px solid var(--easy); transform: rotate(-45deg) translateY(-1px); display: block; }

        .q-link { color: var(--info-text); text-decoration: none; font-weight: 500; }
        .q-link:hover { text-decoration: underline; }

        .diff { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; display: inline-block; }
        .d-easy { background: var(--easy-bg); color: var(--easy); }
        .d-med { background: var(--med-bg); color: var(--med); }
        .d-hard { background: var(--hard-bg); color: var(--hard); }

        .co-tags { display: flex; gap: 4px; flex-wrap: wrap; }
        .co { font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 0.5px solid var(--border2); color: var(--text3); background: var(--bg2); white-space: nowrap; }
        .co.swiggy { background: var(--med-bg); color: var(--med); border-color: var(--med-border); }
        .co.zomato { background: var(--hard-bg); color: var(--hard); border-color: var(--hard-border); }
        .co.uber { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
        .co.ms { background: var(--easy-bg); color: var(--easy); border-color: var(--easy-border); }

        .day-tag { font-size: 11px; color: var(--text3); white-space: nowrap; }

        .hidden { display: none; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 9px 16px; border-radius: var(--rad); font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 99; }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(3, 1fr); }
            .co-tags { display: none; }
            .search-wrap input { width: 140px; }
            .qtable th:nth-child(5), .qtable td:nth-child(5) { display: none; }
        }
    </style>
</head>

        [101,'Implement Trie','https://leetcode.com/problems/implement-trie-prefix-tree/','Medium','trie',['s','z','u','m'],19],
        [102,'Word Search II','https://leetcode.com/problems/word-search-ii/','Hard','trie',['u','m'],19],
        [103,'Design Search Autocomplete System','https://leetcode.com/problems/design-search-autocomplete-system/','Hard','trie',['s','z','u'],19],
        [104,'Design Add and Search Words','https://leetcode.com/problems/design-add-and-search-words-data-structure/','Medium','trie',['m'],19],

        // ── DESIGN (SYSTEM / DATA STRUCTURE) ────────────────────────────────────
        [105,'LRU Cache','https://leetcode.com/problems/lru-cache/','Medium','design',['s','z','u','m'],4],
        [106,'LFU Cache','https://leetcode.com/problems/lfu-cache/','Hard','design',['u','m'],18],
        [107,'Design Twitter','https://leetcode.com/problems/design-twitter/','Medium','design',['s','z','m'],18],
        [108,'Design Hit Counter','https://leetcode.com/problems/design-hit-counter/','Medium','design',['u'],3],
        [109,'Design In-Memory File System','https://leetcode.com/problems/design-in-memory-file-system/','Hard','design',['m'],26],
        [110,'Insert Delete GetRandom O(1)','https://leetcode.com/problems/insert-delete-getrandom-o1/','Medium','design',['s','z'],9],
        [111,'Min Stack','https://leetcode.com/problems/min-stack/','Medium','design',['m'],8],
        [112,'Design Browser History','https://leetcode.com/problems/design-browser-history/','Medium','design',['m'],18],
        [113,'Design a Food Rating System','https://leetcode.com/problems/design-a-food-rating-system/','Medium','design',['s','z'],15],
        [114,'Time Based Key-Value Store','https://leetcode.com/problems/time-based-key-value-store/','Medium','design',['u'],8],

        // ── STACK / MONOTONIC ───────────────────────────────────────────────────
        [115,'Daily Temperatures','https://leetcode.com/problems/daily-temperatures/','Medium','arrays',['s','z','u'],5],
        [116,'Largest Rectangle in Histogram','https://leetcode.com/problems/largest-rectangle-in-histogram/','Hard','arrays',['u'],23],
        [117,'Next Greater Element I','https://leetcode.com/problems/next-greater-element-i/','Easy','arrays',['m'],5],
        [118,'Evaluate Reverse Polish Notation','https://leetcode.com/problems/evaluate-reverse-polish-notation/','Medium','arrays',['m'],5],

        // ── CONCURRENCY ─────────────────────────────────────────────────────────
        [119,'Print in Order','https://leetcode.com/problems/print-in-order/','Easy','design',['u'],10],
        [120,'Print FooBar Alternately','https://leetcode.com/problems/print-foobar-alternately/','Medium','design',['u','m'],25],
    ];

    const SECTION_NAMES = {
        arrays: 'Arrays, Sliding Window & Linked Lists',
        strings: 'Strings',
        binsearch: 'Binary Search',
        trees: 'Trees & BST',
        graphs: 'Graphs (BFS / DFS / Topological)',
        heap: 'Heap & Priority Queue',
        dp: 'Dynamic Programming',
        backtrack: 'Backtracking',
        trie: 'Trie',
        design: 'Design & Data Structures',
    };

    const SECTION_ORDER = ['arrays','strings','binsearch','trees','graphs','heap','dp','backtrack','trie','design'];

    const CO_MAP = { s:'swiggy', z:'zomato', u:'uber', m:'ms' };
    const CO_LABEL = { s:'Swiggy', z:'Zomato', u:'Uber', m:'Microsoft' };

    const SK = 'dsa30_v1';
    let state = { done: [] };
    function load() {
        try { const r = localStorage.getItem(SK); if (r) state = JSON.parse(r); if (!Array.isArray(state.done)) state.done = []; } catch(e) { state = {done:[]}; }
    }
    function save() { try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {} }

    let filters = { pattern: 'all', company: 'all', status: 'all' };

    function setFilter(type, val, btn) {
        filters[type] = val;
        const group = btn.parentElement.querySelectorAll('.fb');
        // only toggle within same group (between the separators)
        let inGroup = false;
        const allBtns = document.querySelectorAll('.fb');
        // simple approach: find buttons that call setFilter with same type
        allBtns.forEach(b => {
            const oc = b.getAttribute('onclick') || '';
            if (oc.includes(`'${type}'`)) b.classList.remove('on');
        });
        btn.classList.add('on');
        renderAll();
    }

    function renderAll() {
        const search = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('container');
        container.innerHTML = '';

        let totalVisible = 0;

        SECTION_ORDER.forEach(pattern => {
            let qs = Q.filter(q => {
                if (filters.pattern !== 'all' && q[4] !== filters.pattern) return false;
                if (filters.company !== 'all' && !q[5].includes(Object.keys(CO_MAP).find(k => CO_MAP[k] === filters.company))) return false;
                if (filters.status === 'done' && !state.done.includes(q[0])) return false;
                if (filters.status === 'pending' && state.done.includes(q[0])) return false;
                if (search && !q[1].toLowerCase().includes(search)) return false;
                if (q[4] !== pattern) return false;
                return true;
            });

            if (qs.length === 0) return;
            totalVisible += qs.length;

            const sec = document.createElement('div');
            sec.className = 'section';

            const rows = qs.map(q => {
                const isDone = state.done.includes(q[0]);
                const coTags = q[5].map(c => `<span class="co ${CO_MAP[c]}">${CO_LABEL[c]}</span>`).join('');
                const diffCls = q[3] === 'Easy' ? 'd-easy' : q[3] === 'Medium' ? 'd-med' : 'd-hard';
                return `<tr class="${isDone ? 'done' : ''}" id="row-${q[0]}">
        <td style="width:32px"><div class="ck ${isDone ? 'on' : ''}" onclick="toggle(${q[0]},this)" role="checkbox" aria-checked="${isDone}" aria-label="Mark done"></div></td>
        <td class="q-name"><a class="q-link" href="${q[2]}" target="_blank" rel="noopener">${q[1]}</a></td>
        <td style="width:80px"><span class="diff ${diffCls}">${q[3]}</span></td>
        <td style="width:200px"><div class="co-tags">${coTags}</div></td>
        <td style="width:60px"><span class="day-tag">Day ${q[6]}</span></td>
      </tr>`;
            }).join('');

            const doneInSection = qs.filter(q => state.done.includes(q[0])).length;

            sec.innerHTML = `
      <div class="section-title">
        ${SECTION_NAMES[pattern]}
        <span class="section-count">${doneInSection}/${qs.length} done</span>
      </div>
      <table class="qtable">
        <thead><tr>
          <th></th>
          <th>Problem</th>
          <th>Difficulty</th>
          <th>Company</th>
          <th>Day</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
            container.appendChild(sec);
        });

        if (totalVisible === 0) {
            container.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text3);font-size:14px">No questions match your filters.</div>`;
        }

        updateStats();
    }

    function toggle(id, el) {
        const i = state.done.indexOf(id);
        if (i > -1) { state.done.splice(i, 1); }
        else { state.done.push(id); }
        save();
        el.classList.toggle('on');
        el.setAttribute('aria-checked', String(state.done.includes(id)));
        const row = document.getElementById('row-' + id);
        if (row) {
            row.classList.toggle('done');
            const qname = row.querySelector('.q-name');
            if (qname) qname.classList.toggle('q-name');
        }
        updateStats();
        showToast(state.done.includes(id) ? '✓ Marked done' : 'Marked pending');
    }

    function updateStats() {
        const total = Q.length;
        const done = state.done.length;
        const rem = total - done;
        const easyDone = state.done.filter(id => { const q = Q.find(q => q[0] === id); return q && q[3] === 'Easy'; }).length;
        const mhDone = state.done.filter(id => { const q = Q.find(q => q[0] === id); return q && q[3] !== 'Easy'; }).length;
        document.getElementById('s-total').textContent = total;
        document.getElementById('s-done').textContent = done;
        document.getElementById('s-rem').textContent = rem;
        document.getElementById('s-easy').textContent = easyDone;
        document.getElementById('s-mh').textContent = mhDone;
        document.getElementById('prog').style.width = Math.round((done / total) * 100) + '%';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
    }

    load();
    renderAll();
</script>
</body>
</html>
